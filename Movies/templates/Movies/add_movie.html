<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Movie - CinemaCMS</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .movie-header {
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            color: white;
        }

        .card {
            border-radius: 12px;
        }

        .form-control:focus {
            border-color: #4e4376;
            box-shadow: 0 0 0 0.2rem rgba(78, 67, 118, 0.2);
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">

        <div class="container">

            <a class="navbar-brand" href="{% url 'home' %}">
                🎬 CinemaCMS
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active"
                           href="{% url 'movies:movies_list' %}">
                            Movies
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{% url 'guests:guests_list' %}">
                            Guests
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{% url 'reservations:reservations_list' %}">
                            Reservations
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main Container -->
    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-8 col-lg-6">

                <!-- Breadcrumb -->
                <nav aria-label="breadcrumb" class="mb-4">

                    <ol class="breadcrumb">

                        <li class="breadcrumb-item">

                            <a href="{% url 'movies:movies_list' %}"
                               class="text-decoration-none">

                                Movies

                            </a>

                        </li>

                        <li class="breadcrumb-item active"
                            aria-current="page">

                            Add Movie

                        </li>

                    </ol>

                </nav>

                <!-- Add Movie Card -->
                <div class="card shadow-sm border-0">

                    <!-- Card Header -->
                    <div class="card-header movie-header py-3">

                        <div class="d-flex align-items-center">

                            <span class="fs-3 me-3">
                                🎥
                            </span>

                            <div>

                                <h4 class="fw-bold mb-0">
                                    Add New Movie
                                </h4>

                                <small class="opacity-75">
                                    Register a new screening in the cinema system
                                </small>

                            </div>

                        </div>

                    </div>

                    <!-- Card Body -->
                    <div class="card-body p-4">

                        <!-- Movie Form -->
                        <form method="POST">

                            {% csrf_token %}

                            <!-- Movie Name -->
                            <div class="mb-3">

                                <label for="name"
                                       class="form-label fw-semibold text-secondary">

                                    Movie Name

                                </label>

                                <input type="text"
                                       class="form-control"
                                       id="name"
                                       name="name"
                                       placeholder="e.g. Interstellar"
                                       required>

                            </div>

                            <!-- Start Time -->
                            <div class="mb-3">

                                <label for="start_time"
                                       class="form-label fw-semibold text-secondary">

                                    Screening Time

                                </label>

                                <input type="datetime-local"
                                       class="form-control"
                                       id="start_time"
                                       name="start_time"
                                       required>

                            </div>

                            <!-- Duration -->
                            <div class="mb-3">

                                <label for="duration"
                                       class="form-label fw-semibold text-secondary">

                                    Duration

                                </label>

                                <input type="text"
                                       class="form-control"
                                       id="duration"
                                       name="duration"
                                       placeholder="02:30:00"
                                       pattern="^([0-1]?[0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$"
                                       required>

                                <div class="form-text">
                                    Enter movie duration in HH:MM:SS format
                                    (Example: 02:30:00)
                                </div>

                            </div>

                            <!-- Hall Number -->
                            <div class="mb-3">

                                <label for="hall_number"
                                       class="form-label fw-semibold text-secondary">

                                    Hall Number

                                </label>

                                <input type="number"
                                       class="form-control"
                                       id="hall_number"
                                       name="hall_number"
                                       placeholder="e.g. 3"
                                       required>

                            </div>

                            <!-- Reservation Price -->
                            <div class="mb-4">

                                <label for="reservation_price"
                                       class="form-label fw-semibold text-secondary">

                                    Reservation Price ($)

                                </label>

                                <input type="number"
                                       step="0.01"
                                       class="form-control"
                                       id="reservation_price"
                                       name="reservation_price"
                                       placeholder="e.g. 12.99"
                                       required>

                            </div>

                            <hr class="my-4">

                            <!-- Action Buttons -->
                            <div class="d-flex gap-2 justify-content-end">

                                <a href="{% url 'movies:movies_list' %}"
                                   class="btn btn-outline-secondary px-4">

                                    Cancel

                                </a>

                                <button type="submit"
                                        class="btn btn-primary fw-semibold px-4">

                                    Save Movie

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
