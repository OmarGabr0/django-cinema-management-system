<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Movie - CinemaCMS</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <!-- Warning Confirmation Card -->
            <div class="card shadow border-0 mt-5">
                <div class="card-body p-4 text-center">
                    
                   
                    <div class="text-danger mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-exclamation-triangle-fill" viewBox="0 0 16 16">
                            <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                        </svg>
                    </div>
                    
                    <h3 class="fw-bold text-dark mb-2">Delete Movie?</h3>
                    <p class="text-muted mb-4">
                        Are you sure you want to permanently delete <strong>"{{ movie.name }}"</strong>? This action cannot be undone.
                    </p>

                    <!-- Secure Form for Data Deletion -->
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="d-grid gap-2">
                            
                            <button type="submit" class="btn btn-danger btn-lg fw-semibold">
                                Yes, Delete Permanently
                            </button>

                            <a href="{% url 'movies:movies_list' %}" class="btn btn-outline-secondary">
                                Cancel, Keep Movie
                            </a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
