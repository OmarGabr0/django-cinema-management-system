<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Movie - CinemaCMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark fw-bold">
                    🎬 Edit Movie: {{ movie.name }}
                </div>
                <div class="card-body p-4">
                    
                    <!-- The form sends data back via POST -->
                    <form method="POST">
                        {% csrf_token %}
                        
                        <!-- Movie Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Movie Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ movie.name }}" required>
                        </div>

                        <!-- Hall Number -->
                        <div class="mb-3">
                            <label for="hall_number" class="form-label fw-semibold">Hall Number</label>
                            <input type="number" class="form-control" id="hall_number" name="hall_number" value="{{ movie.hall_number }}" required>
                        </div>

                        <!-- Reservation Price -->
                        <div class="mb-3">
                            <label for="reservation_price" class="form-label fw-semibold">Reservation Price ($)</label>
                            <input type="number" step="0.01" class="form-control" id="reservation_price" name="reservation_price" value="{{ movie.reservation_price }}" required>
                        </div>

                        <!-- Duration -->
                        <div class="mb-4">
                            <label for="duration" class="form-label fw-semibold">Duration (Minutes)</label>
                            <input type="number" class="form-control" id="duration" name="duration" value="{{ movie.duration }}" required>
                        </div>

                        <!-- Form Actions -->
                        <div class="d-flex gap-2 justify-content-end">
                            <a href="{% url 'movies:movies_list' %}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-warning fw-semibold">Update Movie</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
