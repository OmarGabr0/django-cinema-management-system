<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }} - CinemaCMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🎬 CinemaCMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="{% url 'movie_list' %}">Back to Catalog</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <!-- Movie Detail Card -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-5">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <span class="text-uppercase tracking-wider text-muted small fw-bold">Now Showing</span>
                            <h1 class="display-5 fw-bold text-dark mt-1">{{ movie.title }}</h1>
                        </div>
                        <span class="badge bg-dark fs-6 p-2">Hall {{ movie.hall_number }}</span>
                    </div>

                    <hr class="my-4">

                    <!-- Metadata Rows -->
                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <div class="p-3 bg-light rounded">
                                <small class="text-muted d-block">Screening Date</small>
                                <span class="fw-bold fs-5">{{ movie.date|default:"Date not set yet" }}</span>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="p-3 bg-light rounded">
                                <small class="text-muted d-block">Total Bookings</small>
                                <!-- Using your related_name pattern 'reservations' to count records -->
                                <span class="fw-bold fs-5 text-primary">{{ movie.reservations.count|default:"0" }} Reserved</span>
                            </div>
                        </div>
                    </div>

                    <!-- Action Panel -->
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{% url 'movie_list' %}" class="btn btn-outline-secondary">Back</a>
                        <a href="#" class="btn btn-warning">Edit Details</a>
                        <a href="#" class="btn btn-danger">Delete Movie</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
