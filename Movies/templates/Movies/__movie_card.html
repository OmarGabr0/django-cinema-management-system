<div class="card h-100 border-0 shadow-sm">
    <!-- Movie Header/Badge -->
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <span class="badge bg-primary">🎬 Hall {{ movie.hall_number }}</span>
        <small class="text-muted-light">{{ movie.date|default:"TBD" }}</small>
    </div>
    
    <!-- Card Body -->
    <div class="card-body">
        <h5 class="card-title fw-bold text-dark mb-3">{{ movie.title }}</h5>
        <p class="card-text text-muted small">
            Ready for screening. You can manage tickets and track guest reservations for this show.
        </p>
    </div>
    
    <!-- Card Footer Actions -->
    <div class="card-footer bg-white border-0 d-flex gap-2 pb-3">
        <!-- Dynamically passes the movie ID to the details route -->
        <a href="{% url 'movie_detail' movie.id %}" class="btn btn-sm btn-outline-dark w-100">View Details</a>
        <a href="{% url 'reservations:book_reservation' movie.id %}" class="btn btn-sm btn-primary w-100">Book Ticket</a>
    </div>
</div>
