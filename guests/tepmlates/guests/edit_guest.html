<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Guest Profile - CinemaCMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navigation Bar (Consistent with Rest of System) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🎬 CinemaCMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Movies</a></li>
                <li class="nav-item"><a class="nav-link active" href="{% url 'guests:guests_list' %}">Back to Registry</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Reservations</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Form Container -->
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <!-- Breadcrumb Navigation -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'guests:guests_list' %}" class="text-decoration-none">Guests</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Edit Profile</li>
                </ol>
            </nav>

            <!-- Edit Card -->
            <div class="card shadow-sm border-0">
                <div class="card-header bg-warning text-dark py-3">
                    <div class="d-flex align-items-center">
                        <span class="fs-4 me-2">📝</span>
                        <div>
                            <h5 class="fw-bold mb-0">Modify Guest Account</h5>
                            <small class="opacity-75">Updating profile for system ID: #{{ guest.guest_id }}</small>
                        </div>
                    </div>
                </div>
                
                <div class="card-body p-4">
                    <!-- Form submits a secure POST request to the current URL handling the FBV -->
                    <form method="POST">
                        {% csrf_token %}
                        
                        <!-- Guest Full Name Input -->
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold text-secondary">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted">👤</span>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="name" 
                                    name="name" 
                                    value="{{ guest.name }}" 
                                    placeholder="e.g. John Doe"
                                    required
                                >
                            </div>
                        </div>

                        <!-- Guest Email Address Input -->
                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold text-secondary">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted">✉️</span>
                                <input 
                                    type="email" 
                                    class="form-control" 
                                    id="email" 
                                    name="email" 
                                    value="{{ guest.email }}" 
                                    placeholder="name@example.com"
                                    required
                                >
                            </div>
                            <div class="form-text text-muted small">
                                Ensure this email is unique; duplicate customer accounts are protected by the database layer.
                            </div>
                        </div>

                        <hr class="my-4">

                        <!-- Action Controls -->
                        <div class="d-flex gap-2 justify-content-end">
                            <!-- Canceling sends the operator safely back to the full list -->
                            <a href="{% url 'guests:guests_list' %}" class="btn btn-outline-secondary px-4">
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-warning fw-semibold px-4">
                                Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
