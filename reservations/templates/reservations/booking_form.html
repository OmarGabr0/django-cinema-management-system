{% extends 'base.html' %}

{% block title %}Book a Ticket - Cinema Management{% block title %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                    <h3 class="fw-bold text-dark mb-1">Create Reservation</h3>
                    <p class="text-muted small">Link an existing guest profile to a scheduled film screening.</p>
                </div>

                <form method="POST" action="{% url 'reservations:book_reservation' %}">
                    {% csrf_token %}
                    
                    <!-- Guest Selection Dropdown -->
                    <div class="mb-3">
                        <label for="guest" class="form-label fw-semibold text-secondary">Select Guest</label>
                        <select class="form-select border-2" id="guest" name="guest" required>
                            <option value="" disabled selected>-- Choose a Guest --</option>
                            {% for guest in guests %}
                                <option value="{{ guest.guest_id }}">
                                    {{ guest.name }} ({{ guest.email }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Movie Selection Dropdown -->
                    <div class="mb-4">
                        <label for="movie" class="form-label fw-semibold text-secondary">Select Movie Screening</label>
                        <select class="form-select border-2" id="movie" name="movie" required>
                            <option value="" disabled selected>-- Choose a Movie --</option>
                            {% for movie in movies %}
                                <option value="{{ movie.id }}">
                                    {{ movie.name }} — Hall {{ movie.hall_number }} (${{ movie.reservation_price }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{% url 'reservations:reservations_list' %}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Confirm Booking</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
